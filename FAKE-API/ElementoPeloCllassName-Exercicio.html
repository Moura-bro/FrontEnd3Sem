<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .corsim {
            color: red;
        }

        .cornao {
            color: gray;
        }

    </style>
</head>

<body>
    <input type="text" id="fruta"  placeholder="digite o nome da Fruta">
    <select name="" id="nomeClasse">
        <option value="">Selecione</option>
        <option value="corsim">CorSim</option> 
        <option value="cornao">CorNao</option>
    </select>
    <button onclick="CadastrarFruta();">Cadastra</button>

    <h1>Frutas</h1>
    <ul id="listaFrutas">
        <li class="corsim">Amora</li>
    </ul>



    <script>
        function CadastrarFruta() {
            //Entrada de dados
            const fruta = document.getElementById("fruta").value;
            const nomeClasse = document.getElementById("nomeClasse").value;
            const listaFrutas = document.getElementById("listaFrutas");


            if(fruta.trim().length == 0 || nomeClasse.length == 0){
                alert("Preencha todos os campos: Fruta e nome da classe")
                return false;
            }

            listaFrutas.innerHTML += `<li class="${nomeClasse}">${fruta}</li>`

        }
    </script>
</body>

</html>
